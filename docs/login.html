<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - SWPU-NCIC 巡检系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-server"></i>
                    <h1>SWPU-NCIC 巡检系统</h1>
                </div>
                <p class="subtitle">西南石油大学网络与信息化中心</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="swpuUsername" class="form-label">
                        <i class="fas fa-user"></i> 用户名
                    </label>
                    <input type="text" id="swpuUsername" name="swpuUsername" class="form-control" placeholder="请输入用户名" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">
                        <i class="fas fa-lock"></i> 密码
                    </label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="请输入密码" required>
                </div>

                <div class="form-group form-check">
                    <input type="checkbox" id="remember" name="remember" class="form-check-input">
                    <label for="remember" class="form-check-label">记住我</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>

                <div class="auth-footer">
                    <p>还没有账号？ <a href="register.html">立即注册</a></p>
                </div>
            </form>

            <div class="admin-tip" style="margin-top: 20px; padding: 10px; background: #e8eaf6; border-radius: 8px; text-align: center;">
                <i class="fas fa-shield-alt" style="color: #1a237e;"></i>
                管理员账户可访问 <a href="admin.html" style="color: #1a237e; font-weight: 600;">管理后台</a>
            </div>

        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/swpu-shared.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
