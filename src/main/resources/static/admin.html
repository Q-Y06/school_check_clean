<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 西南石油大学数据中心巡检系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/ai-character.css">
</head>
<body>
    <div class="admin-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-server"></i>
                    <span>SWPU-NCIC 管理台</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">核心管理</div>
                    <ul class="sidebar-menu">
                        <li class="active" data-page="dashboard">
                            <i class="fas fa-chart-pie"></i>
                            <span>仪表盘</span>
                        </li>
                        <li data-page="swpuUsers">
                            <i class="fas fa-users"></i>
                            <span>用户管理</span>
                        </li>
                        <li data-page="ncicRooms">
                            <i class="fas fa-building"></i>
                            <span>机房管理</span>
                        </li>
                        <li data-page="devices">
                            <i class="fas fa-microchip"></i>
                            <span>设备仪器</span>
                        </li>
                        <li data-page="managementPages">
                            <i class="fas fa-desktop"></i>
                            <span>管理页面</span>
                        </li>
                    </ul>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">巡检管理</div>
                    <ul class="sidebar-menu">
                        <li data-page="dailyPatrols">
                            <i class="fas fa-clipboard-list"></i>
                            <span>巡检记录</span>
                        </li>
                        <li data-page="duty" id="menu-duty">
                            <i class="fas fa-calendar-alt"></i>
                            <span>值班管理</span>
                            <span class="badge">新</span>
                        </li>
                        <li data-page="reports">
                            <i class="fas fa-chart-bar"></i>
                            <span>统计报表</span>
                        </li>
                    </ul>
                </div>

                <div class="nav-section">
                    <div class="nav-section-title">知识与系统</div>
                    <ul class="sidebar-menu">
                        <li data-page="knowledge">
                            <i class="fas fa-book"></i>
                            <span>知识库</span>
                        </li>
                        <li data-page="documents">
                            <i class="fas fa-file-alt"></i>
                            <span>设备文档</span>
                        </li>
                        <li data-page="settings">
                            <i class="fas fa-cog"></i>
                            <span>系统设置</span>
                        </li>
                        <li data-page="logs">
                            <i class="fas fa-history"></i>
                            <span>操作日志</span>
                        </li>
                    </ul>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="swpuUser-info">
                    <div class="swpuUser-avatar">管</div>
                    <div class="swpuUser-details">
                        <div class="swpuUser-name">管理员</div>
                        <div class="swpuUser-role">系统管理员</div>
                    </div>
                </div>
                <div class="footer-actions" style="display:flex; gap:10px;">
                    <a href="index.html" class="logout-btn" title="返回前台">
                        <i class="fas fa-home"></i>
                    </a>
                    <button id="logout-btn" class="logout-btn" title="退出登录">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <button class="menu-toggle" aria-label="展开菜单">
                    <i class="fas fa-bars"></i>
                </button>

                <div class="header-actions">
                    <button class="notification-btn" type="button">
                        <i class="fas fa-bell"></i>
                        <span class="badge">3</span>
                    </button>
                    <button class="fullscreen-btn" type="button" onclick="toggleFullscreen()">
                        <i class="fas fa-expand"></i>
                    </button>
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="current-date"></span>
                    </div>
                </div>
            </header>

            <div id="skeleton-wrapper" style="display:none;"></div>
            <div class="page-container" id="page-container"></div>
        </main>
    </div>

    <div id="swpuUserModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>用户管理</h2>
                <button class="close-btn" onclick="closeModal('swpuUserModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body"></div>
        </div>
    </div>

    <div id="ncicRoomModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>机房管理</h2>
                <button class="close-btn" onclick="closeModal('ncicRoomModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body"></div>
        </div>
    </div>

    <div id="taskModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>任务分配</h2>
                <button class="close-btn" onclick="closeModal('taskModal')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body"></div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="js/api.js"></script>
    <script src="js/swpu-shared.js"></script>
    <script src="js/admin.duty.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/ai-character.js"></script>
</body>
</html>
