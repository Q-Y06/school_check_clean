<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - SWPU-NCIC 巡检系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
    <style>
        .register-container { display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); }
        .register-card { background:white; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,.15); max-width:560px; width:100%; padding:40px; }
        .button-group { display:flex; gap:15px; margin-top:30px; }
        .btn-link { background:#f5f5f5; color:#333; text-decoration:none; }
        .btn-link:hover { background:#e0e0e0; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-user-plus"></i>
                    <h1>创建账号</h1>
                </div>
                <p class="subtitle">数据中心巡检系统 - 西南石油大学</p>
            </div>

            <form id="registerForm">
                <div class="form-group"><label for="fullname" class="form-label"><i class="fas fa-id-card"></i> 真实姓名</label><input type="text" id="fullname" name="fullname" class="form-control" placeholder="请输入真实姓名" required autofocus></div>
                <div class="form-group"><label for="department" class="form-label"><i class="fas fa-building"></i> 所属部门</label><input type="text" id="department" name="department" class="form-control" placeholder="请输入部门名称" required></div>
                <div class="form-group"><label for="employeeId" class="form-label"><i class="fas fa-barcode"></i> 工号/学号</label><input type="text" id="employeeId" name="employeeId" class="form-control" placeholder="请输入工号或学号" required></div>
                <div class="form-group"><label for="email" class="form-label"><i class="fas fa-envelope"></i> 邮箱</label><input type="email" id="email" name="email" class="form-control" placeholder="example@swpu.edu.cn" required></div>
                <div class="form-group"><label for="phone" class="form-label"><i class="fas fa-phone"></i> 手机号</label><input type="tel" id="phone" name="phone" class="form-control" placeholder="13800138000" required></div>
                <div class="form-group"><label for="swpuUsername" class="form-label"><i class="fas fa-user"></i> 用户名</label><input type="text" id="swpuUsername" name="swpuUsername" class="form-control" placeholder="请输入用户名" minlength="3" maxlength="20" required></div>
                <div class="form-group"><label for="password" class="form-label"><i class="fas fa-lock"></i> 登录密码</label><input type="password" id="password" name="password" class="form-control" placeholder="至少 8 位" minlength="8" required></div>
                <div class="form-group"><label for="confirmPassword" class="form-label"><i class="fas fa-lock"></i> 确认密码</label><input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="请再次输入密码" required></div>
                <div class="form-group"><label for="role" class="form-label"><i class="fas fa-user-tag"></i> 用户角色</label><select id="role" name="role" class="form-control" required><option value="">请选择角色</option><option value="admin">管理员</option><option value="engineer">巡检工程师</option><option value="duty">值班工程师</option></select></div>
                <div class="form-group form-check"><input type="checkbox" id="agreeTerms" name="agreeTerms" class="form-check-input" required><label for="agreeTerms" class="form-check-label">我已阅读并同意系统使用规范</label></div>
                <div class="button-group">
                    <a href="login.html" class="btn btn-link" style="flex:1; display:flex; justify-content:center; align-items:center;"><i class="fas fa-arrow-left"></i> 返回登录</a>
                    <button type="submit" class="btn btn-primary" style="flex:1;"><i class="fas fa-user-plus"></i> 提交注册</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/swpu-shared.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
