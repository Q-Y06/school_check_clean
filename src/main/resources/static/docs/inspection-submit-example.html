<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>巡检提交操作示例</title>
    <style>
        body { font-family: "Microsoft YaHei", Arial, sans-serif; margin: 32px; line-height: 1.8; color: #1f2a44; }
        h1 { color: #252f91; }
        li { margin: 8px 0; }
    </style>
</head>
<body>
    <h1>巡检提交操作示例</h1>
    <ol>
        <li>进入待巡检的机房、硬件设备或管理页面详情。</li>
        <li>选择巡检状态：正常、警告或异常。</li>
        <li>填写巡检备注，必要时上传截图或补充富文本说明。</li>
        <li>点击提交后，系统会同步更新状态并生成巡检历史记录。</li>
    </ol>
</body>
</html>
