<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西南石油大学数据中心巡检管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/ai-character.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-server"></i>
                    </div>
                    <div class="logo-text">
                        <h1>数据中心巡检管理系统</h1>
                        <p>西南石油大学 · 网络与信息化中心</p>
                    </div>
                </div>
                <div class="swpuUser-info">
                    <div class="swpuUser-avatar">夏</div>
                    <div class="swpuUser-details">
                        <div class="swpuUser-name">巡检人员</div>
                        <div class="swpuUser-role">巡检工程师</div>
                    </div>
                    <button id="logout-btn" title="退出登录">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="main-content">
            <div class="left-column">
                <div class="card">
                    <a href="detail.html?view=all" class="btn-primary">
                        <i class="fas fa-clipboard-list"></i>
                        查看全部巡检记录
                    </a>

                    <div class="card-title">
                        <i class="fas fa-building"></i>
                        <h2>机房</h2>
                    </div>
                    <div class="location-list" id="ncicRoom-list"></div>

                    <div class="card-title" style="margin-top: 25px;">
                        <i class="fas fa-bolt"></i>
                        <h2>UPS机房</h2>
                    </div>
                    <div class="location-list" id="ups-ncicRoom-list"></div>

                    <div class="card-title" style="margin-top: 25px;">
                        <i class="fas fa-microchip"></i>
                        <h2>硬件设备巡查</h2>
                    </div>
                    <div class="device-list" id="device-list"></div>

                    <div class="card-title" style="margin-top: 25px;">
                        <i class="fas fa-desktop"></i>
                        <h2>管理页面巡查</h2>
                    </div>
                    <div class="management-list" id="management-page-list"></div>

                    <div class="card-title" style="margin-top: 25px;">
                        <i class="fas fa-book"></i>
                        <h2>知识与文档</h2>
                    </div>
                    <div class="management-list">
                        <div class="management-item" id="btn-knowledge-base">
                            <i class="fas fa-book-open"></i> 故障知识库
                        </div>
                        <div class="management-item" id="btn-my-history">
                            <i class="fas fa-history"></i> 我的巡检历史
                        </div>
                        <div class="management-item" id="btn-device-docs">
                            <i class="fas fa-file-alt"></i> 设备文档查询
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-column">
                <div class="card sidebar-card">
                    <div class="card-title">
                        <i class="fas fa-chart-line"></i>
                        <h2>系统总览</h2>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value" id="total-ncicRooms">0</div>
                            <div class="stat-label">机房总数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="unchecked-ncicRooms">0</div>
                            <div class="stat-label">待巡检</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="normal-ncicRooms">0</div>
                            <div class="stat-label">正常</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="problem-ncicRooms">0</div>
                            <div class="stat-label">异常</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="total-devices">0</div>
                            <div class="stat-label">设备仪器</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="total-management-pages">0</div>
                            <div class="stat-label">管理页面</div>
                        </div>
                    </div>

                    <div class="card-title" style="margin-top: 30px;">
                        <i class="fas fa-bell"></i>
                        <h2>今日告警</h2>
                    </div>
                    <ul class="recent-activity" id="recent-activities"></ul>
                </div>

                <div class="card" id="todayDutyCard">
                    <div class="card-title">
                        <i class="fas fa-calendar-check"></i>
                        <h2>今日值班</h2>
                    </div>
                    <div class="duty-card-body" id="todayDutyBody"></div>
                </div>
            </div>
        </div>

        <footer>
            <p>西南石油大学 数据中心巡检管理系统 © 2026</p>
            <p>SWPU-NCIC 值班与巡检联动演示版</p>
        </footer>
    </div>

    <div class="admin-entry" style="position: fixed; bottom: 20px; right: 20px; z-index: 100; display: none;">
        <a href="admin.html" class="btn-primary" style="border-radius: 999px; margin-bottom: 0;">
            <i class="fas fa-cog"></i>
            管理后台
        </a>
    </div>

    <script src="js/api.js"></script>
    <script src="js/swpu-shared.js"></script>
    <script src="js/main.js"></script>
    <script src="js/index.js"></script>
    <script src="js/ai-character.js"></script>
</body>
</html>
